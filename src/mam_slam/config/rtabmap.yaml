# RTAB-Map parameters — 2D LaserScan pipeline
#
# ICPOdometry provides:
#   /odometry           nav_msgs/Odometry   (odom → base_link TF)
# CPU lidar provides:
#   /scan               sensor_msgs/LaserScan
#
# RTAB-Map adds:
#   loop-closure detection
#   /map                nav_msgs/OccupancyGrid   (for Nav2)

rtabmap:
  ros__parameters:
    use_sim_time: true

    # ---------- Frame IDs ----------
    frame_id:       base_link
    odom_frame_id:  odom
    map_frame_id:   map

    # ---------- Subscriptions ----------
    subscribe_depth:      false
    subscribe_rgb:        false
    subscribe_scan:       true
    subscribe_scan_cloud: false
    approx_sync:          true
    queue_size:           10

    # ---------- Mapping ----------
    Grid/CellSize:              "0.05"
    Grid/RangeMax:              "15.0"
    Grid/RangeMin:              "0.3"
    Grid/FromDepth:             "false"
    Grid/MaxObstacleHeight:     "2.0"
    Grid/MinGroundHeight:       "-0.1"
    Grid/NormalsSegmentation:   "false"

    # ---------- ICP loop closure ----------
    Reg/Strategy:               "1"
    Icp/MaxCorrespondenceDistance: "0.15"
    Icp/MaxTranslation:         "0.3"
    Icp/VoxelSize:              "0.05"

    # ---------- Graph optimisation ----------
    RGBD/NeighborLinkRefining:  "true"
    RGBD/ProximityBySpace:      "true"
    RGBD/AngularUpdate:         "0.05"
    RGBD/LinearUpdate:          "0.05"
    RGBD/OptimizeFromGraphEnd:  "false"

    # ---------- Memory ----------
    Mem/IncrementalMemory:      "true"
    Mem/InitWMWithAllNodes:     "false"
    Mem/STMSize:                "30"
